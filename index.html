<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Flip Runner Racing</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; background:#2e9be6; touch-action:none; overscroll-behavior:none;
    font-family: ui-rounded, "Trebuchet MS", "Segoe UI", system-ui, sans-serif; user-select:none; -webkit-user-select:none; }
  #cv { position:fixed; inset:0; width:100%; height:100%; display:block; }

  /* ---------- HUD ---------- */
  #hud { position:fixed; top:env(safe-area-inset-top, 0); left:0; right:0; display:none; align-items:center;
    justify-content:space-between; padding:10px 14px; pointer-events:none; z-index:5; }
  body.ingame #hud { display:flex; }
  .hudGroup { display:flex; align-items:center; gap:18px; }
  .hudItem { display:flex; align-items:center; gap:7px; color:#fff; font-weight:800; font-size:26px;
    text-shadow:0 2px 0 rgba(0,0,0,.35); }
  .hudIcon { font-size:26px; filter:drop-shadow(0 2px 0 rgba(0,0,0,.25)); }
  #fuelWrap { display:flex; flex-direction:column; gap:3px; }
  #fuelBarOuter { width:86px; height:8px; background:rgba(0,0,0,.35); border-radius:5px; overflow:hidden; }
  #fuelBar { height:100%; width:100%; background:linear-gradient(90deg,#ff4040,#ffd000,#39d039); border-radius:5px;
    transition:width .15s linear; }
  .hudBtn { pointer-events:auto; width:58px; height:58px; border:none; border-radius:16px; cursor:pointer;
    font-size:30px; font-weight:900; color:#fff; line-height:1;
    background:linear-gradient(180deg,#ffc04d,#f08a18); box-shadow:0 4px 0 #b35f06, inset 0 2px 2px rgba(255,255,255,.55);
    text-shadow:0 2px 0 rgba(0,0,0,.25); }
  .hudBtn:active { transform:translateY(3px); box-shadow:0 1px 0 #b35f06; }

  /* ---------- Touch controls ---------- */
  #controls { position:fixed; left:0; right:0; bottom:max(12px, env(safe-area-inset-bottom)); display:none;
    justify-content:space-between; align-items:flex-end; padding:0 16px; z-index:5; pointer-events:none; }
  body.ingame #controls { display:flex; }
  .ctl { pointer-events:auto; border:none; cursor:pointer; color:#fff; font-weight:900; letter-spacing:1px;
    border-radius:18px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    text-shadow:0 2px 0 rgba(0,0,0,.3); box-shadow:0 5px 0 rgba(0,0,0,.3), inset 0 3px 3px rgba(255,255,255,.45); }
  .ctl:active, .ctl.held { transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,.3), inset 0 3px 3px rgba(255,255,255,.45); filter:brightness(1.12); }
  #ctlBrake, #ctlGas { width:118px; height:118px; font-size:19px;
    background:linear-gradient(180deg,#ffb054,#ef7d1a); }
  .ctlDots { display:grid; grid-template-columns:repeat(3,14px); gap:8px; }
  .ctlDots span { width:14px; height:14px; border-radius:50%; background:rgba(80,30,0,.55); box-shadow:inset 0 2px 2px rgba(0,0,0,.4); }
  #ctlChute { width:92px; height:74px; font-size:34px; margin:0 10px;
    background:linear-gradient(180deg,#62d0f0,#1f8fd6); opacity:.55; transition:opacity .15s, transform .1s; }
  #ctlChute.ready { opacity:1; animation:pulse 0.8s infinite alternate; }
  @keyframes pulse { from { filter:brightness(1);} to { filter:brightness(1.35);} }
  #ctlRight { display:flex; align-items:flex-end; }

  /* ---------- Overlays ---------- */
  .ov { position:fixed; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; opacity:0; visibility:hidden; transition:opacity .25s, visibility .25s; padding:20px; }
  .ov.show { opacity:1; visibility:visible; }
  .ovBlur { background:rgba(40,60,80,.25); backdrop-filter:blur(9px); -webkit-backdrop-filter:blur(9px); }

  #ovMenu { background:
    repeating-conic-gradient(from 0deg, rgba(255,255,255,.13) 0deg 9deg, rgba(255,255,255,0) 9deg 18deg),
    radial-gradient(circle at 50% 45%, #ffd95e 0%, #f5a623 45%, #d97a14 100%); }
  #logo { text-align:center; margin-bottom:6px; transform:rotate(-4deg); }
  #logo .l1 { font-size:min(13vw,76px); font-weight:900; letter-spacing:2px;
    background:linear-gradient(180deg,#fff36b,#ff9d2e 55%,#ff5252); -webkit-background-clip:text; background-clip:text;
    color:transparent; filter:drop-shadow(0 3px 0 rgba(120,40,0,.45)); line-height:.95; }
  #logo .l2 { font-size:min(8vw,44px); font-weight:900; letter-spacing:8px; color:#ff4d6d;
    text-shadow:0 2px 0 #fff, 0 4px 0 rgba(120,0,40,.35); }
  #logoCar { font-size:min(16vw,86px); filter:drop-shadow(0 6px 4px rgba(0,0,0,.25)); animation:bob 1.6s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform:translateY(0) rotate(-3deg);} 50% { transform:translateY(-10px) rotate(3deg);} }

  .pill { border:none; cursor:pointer; color:#fff; font-weight:900; font-size:24px; letter-spacing:1px;
    padding:16px 54px; border-radius:999px; min-width:240px;
    box-shadow:0 5px 0 rgba(0,0,0,.28), inset 0 3px 4px rgba(255,255,255,.55), inset 0 -4px 6px rgba(0,0,0,.18);
    text-shadow:0 2px 0 rgba(0,0,0,.3); transition:transform .08s; font-family:inherit; }
  .pill:active { transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,.28), inset 0 3px 4px rgba(255,255,255,.55); }
  .pTeal   { background:linear-gradient(180deg,#3ee6c0,#18a0c8); }
  .pPurple { background:linear-gradient(180deg,#c873ff,#8b3ee6); }
  .pRed    { background:linear-gradient(180deg,#ffd34d,#ff5252); }
  .pBlue   { background:linear-gradient(180deg,#6fd2ff,#2a7de1); }
  .pillBig { font-size:34px; padding:20px 70px; }

  .roundBtn { border:none; cursor:pointer; width:74px; height:74px; border-radius:50%; font-size:34px; background:#fff;
    color:#222; box-shadow:0 4px 0 rgba(0,0,0,.25); transition:transform .08s; }
  .roundBtn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.25); }
  .roundBtn.off { opacity:.45; text-decoration:line-through; }

  .ovTitle { font-size:min(9vw,46px); font-weight:800; color:#fff; text-shadow:0 3px 0 rgba(0,0,0,.3); }

  /* level select */
  #ovLevels { background:
    repeating-conic-gradient(from 0deg, rgba(255,255,255,.10) 0deg 9deg, rgba(255,255,255,0) 9deg 18deg),
    radial-gradient(circle at 50% 40%, #6fd2ff 0%, #2a9be0 55%, #1670b8 100%); }
  #levelGrid { display:grid; grid-template-columns:repeat(auto-fit, 120px); justify-content:center; gap:14px;
    max-width:720px; width:100%; max-height:55vh; overflow-y:auto; padding:6px; }
  .lvCard { border:none; cursor:pointer; border-radius:18px; padding:12px 6px 10px; color:#fff; font-family:inherit;
    background:linear-gradient(180deg,#3ee6c0,#18a0c8); box-shadow:0 4px 0 rgba(0,0,0,.28), inset 0 3px 3px rgba(255,255,255,.5);
    display:flex; flex-direction:column; align-items:center; gap:4px; transition:transform .08s; }
  .lvCard:active { transform:translateY(3px); }
  .lvCard.locked { background:linear-gradient(180deg,#9fb2bf,#6e8290); cursor:not-allowed; }
  .lvNum { font-size:32px; font-weight:900; text-shadow:0 2px 0 rgba(0,0,0,.3); }
  .lvName { font-size:11px; font-weight:700; opacity:.95; text-align:center; line-height:1.1; min-height:24px; }
  .lvStars { font-size:15px; letter-spacing:2px; color:#ffe24d; text-shadow:0 1px 0 rgba(0,0,0,.4); }

  #endStars { font-size:58px; letter-spacing:8px; color:#ffe24d; text-shadow:0 3px 0 rgba(0,0,0,.35); min-height:70px; }
  #endStats { color:#fff; font-size:20px; font-weight:700; text-shadow:0 2px 0 rgba(0,0,0,.3); text-align:center; line-height:1.5; }
  #ovEnd .pill, #ovPause .pill { margin-top:2px; }

  #musicRow { position:absolute; right:24px; bottom:24px; display:flex; gap:12px; }
  #verTag { position:absolute; left:14px; bottom:10px; color:rgba(255,255,255,.7); font-size:12px; font-weight:700; }

  #hintRotate { display:none; }
  @media (orientation:portrait) and (max-width:560px) {
    #hintRotate { display:block; position:fixed; top:60px; left:0; right:0; text-align:center; color:#fff;
      font-weight:800; font-size:14px; text-shadow:0 2px 0 rgba(0,0,0,.3); z-index:4; pointer-events:none; }
  }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<!-- top HUD -->
<div id="hud">
  <div class="hudGroup">
    <button class="hudBtn" id="btnRestart" title="Restart (R)">&#8635;</button>
    <div class="hudItem"><span class="hudIcon">&#128142;</span><span id="hudGems">0</span></div>
    <div class="hudItem"><span class="hudIcon">&#129689;</span><span id="hudCoins">0</span></div>
    <div class="hudItem"><span class="hudIcon">&#9981;</span>
      <div id="fuelWrap"><span id="hudFuelPct" style="font-size:22px;">100%</span>
        <div id="fuelBarOuter"><div id="fuelBar"></div></div>
      </div>
    </div>
  </div>
  <div class="hudGroup">
    <button class="hudBtn" id="btnPause" title="Pause (P)">&#10074;&#10074;</button>
  </div>
</div>

<div id="hintRotate">Tip: landscape is best &#128241;&#8635;</div>

<!-- bottom controls -->
<div id="controls">
  <button class="ctl" id="ctlBrake">
    <span class="ctlDots"><span></span><span></span><span></span><span></span><span></span><span></span></span>
    BRAKE
  </button>
  <div id="ctlRight">
    <button class="ctl" id="ctlChute" title="Parachute (Space)">&#129665;</button>
    <button class="ctl" id="ctlGas">
      <span class="ctlDots"><span></span><span></span><span></span><span></span><span></span><span></span></span>
      GAS
    </button>
  </div>
</div>

<!-- main menu -->
<div class="ov show" id="ovMenu">
  <div id="logo">
    <div class="l1">FLIP<br>RUNNER</div>
    <div id="logoCar">&#127950;&#65039;</div>
    <div class="l2">RACING</div>
  </div>
  <button class="pill pTeal pillBig" id="btnPlay">PLAY</button>
  <div id="musicRow">
    <button class="roundBtn" id="btnMusic" title="Music">&#127925;</button>
    <button class="roundBtn" id="btnSound" title="Sound FX">&#128266;</button>
  </div>
  <div id="verTag">Flip Runner Racing &middot; remastered</div>
</div>

<!-- level select -->
<div class="ov" id="ovLevels">
  <div class="ovTitle">Select Level</div>
  <div id="levelGrid"></div>
  <button class="pill pRed" id="btnBackMenu">Main Menu</button>
</div>

<!-- pause -->
<div class="ov ovBlur" id="ovPause">
  <div class="ovTitle">Game Paused</div>
  <button class="pill pTeal" id="btnContinue">Continue</button>
  <button class="pill pPurple" id="btnPauseRestart">Restart</button>
  <button class="pill pRed" id="btnPauseMenu">Main Menu</button>
</div>

<!-- level end (complete or failed) -->
<div class="ov ovBlur" id="ovEnd">
  <div class="ovTitle" id="endTitle">Level Complete!</div>
  <div id="endStars"></div>
  <div id="endStats"></div>
  <button class="pill pTeal" id="btnNext">Next Level</button>
  <button class="pill pPurple" id="btnRetry">Retry</button>
  <button class="pill pRed" id="btnEndLevels">Levels</button>
</div>

<script>
"use strict";
/* =====================================================================
   FLIP RUNNER RACING  -  remastered single-file build
   ---------------------------------------------------------------------
   A 2D physics driving game. One car, three inputs: gas, brake and a
   parachute. Collect coins, gems and fuel, survive collapsing bridges
   and ice, reach the flag. Ten levels, three stars each.

   Everything lives in this one file: physics, renderer, audio
   synthesis, levels and UI. No dependencies, no network.
   ===================================================================== */

/* ----------------------------- utils ------------------------------ */
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp = (a, b, t) => a + (b - a) * t;
const TAU = Math.PI * 2;

function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* persistent progress, with an in-memory fallback when storage
   is unavailable (private mode, sandboxed iframes, etc.) */
const Save = (() => {
  const KEY = "fliprunner_save_v1";
  let mem = null;
  function load() {
    try { const raw = localStorage.getItem(KEY); if (raw) return JSON.parse(raw); } catch (e) {}
    return mem || { unlocked: 1, stars: {}, music: true, sound: true };
  }
  function store(d) {
    mem = d;
    try { localStorage.setItem(KEY, JSON.stringify(d)); } catch (e) {}
  }
  return { load, store };
})();
let save = Save.load();

/* ----------------------------- canvas ----------------------------- */
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
let W = 1280, H = 720, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);

/* ----------------------------- input ------------------------------ */
const Input = { gas: false, brake: false, kGas: false, kBrake: false, pGas: 0, pBrake: 0 };
function recomputeInput() {
  Input.gas = Input.kGas || Input.pGas > 0;
  Input.brake = Input.kBrake || Input.pBrake > 0;
  const g = document.getElementById("ctlGas"), b = document.getElementById("ctlBrake");
  if (g) g.classList.toggle("held", Input.gas);
  if (b) b.classList.toggle("held", Input.brake);
}

window.addEventListener("keydown", e => {
  if (e.repeat) return;
  const k = e.code;
  if (k === "ArrowRight" || k === "ArrowUp" || k === "KeyD" || k === "KeyW") { Input.kGas = true; recomputeInput(); }
  if (k === "ArrowLeft" || k === "ArrowDown" || k === "KeyA" || k === "KeyS") { Input.kBrake = true; recomputeInput(); }
  if (k === "Space") { e.preventDefault(); tryChute(); }
  if (k === "KeyR") { if (state === "playing" || state === "end") restartLevel(); }
  if (k === "KeyP" || k === "Escape") {
    if (state === "playing") pauseGame();
    else if (state === "paused") resumeGame();
  }
});
window.addEventListener("keyup", e => {
  const k = e.code;
  if (k === "ArrowRight" || k === "ArrowUp" || k === "KeyD" || k === "KeyW") { Input.kGas = false; recomputeInput(); }
  if (k === "ArrowLeft" || k === "ArrowDown" || k === "KeyA" || k === "KeyS") { Input.kBrake = false; recomputeInput(); }
});
window.addEventListener("blur", () => { Input.kGas = Input.kBrake = false; Input.pGas = Input.pBrake = 0; recomputeInput(); });

/* touch / pointer: dedicated buttons plus screen halves on the canvas */
function bindHold(el, on, off) {
  let ids = new Set();
  el.addEventListener("pointerdown", e => { e.preventDefault(); ids.add(e.pointerId); on(); });
  const end = e => { if (ids.delete(e.pointerId) && ids.size === 0) off(); };
  el.addEventListener("pointerup", end);
  el.addEventListener("pointercancel", end);
  el.addEventListener("pointerleave", end);
  el.addEventListener("contextmenu", e => e.preventDefault());
}
function setupInputs() {
  bindHold(document.getElementById("ctlGas"), () => { Input.pGas++; recomputeInput(); audioUnlock(); },
                                              () => { Input.pGas = Math.max(0, Input.pGas - 1); recomputeInput(); });
  bindHold(document.getElementById("ctlBrake"), () => { Input.pBrake++; recomputeInput(); audioUnlock(); },
                                                () => { Input.pBrake = Math.max(0, Input.pBrake - 1); recomputeInput(); });
  document.getElementById("ctlChute").addEventListener("pointerdown", e => { e.preventDefault(); tryChute(); audioUnlock(); });

  /* hold anywhere on the canvas: right half = gas, left half = brake */
  const ptr = new Map();
  cv.addEventListener("pointerdown", e => {
    if (state !== "playing") return;
    e.preventDefault(); audioUnlock();
    const side = e.clientX > W * 0.5 ? "g" : "b";
    ptr.set(e.pointerId, side);
    if (side === "g") Input.pGas++; else Input.pBrake++;
    recomputeInput();
  });
  const release = e => {
    const side = ptr.get(e.pointerId);
    if (!side) return;
    ptr.delete(e.pointerId);
    if (side === "g") Input.pGas = Math.max(0, Input.pGas - 1);
    else Input.pBrake = Math.max(0, Input.pBrake - 1);
    recomputeInput();
  };
  cv.addEventListener("pointerup", release);
  cv.addEventListener("pointercancel", release);
}

/* ----------------------------- audio ------------------------------ */
const Audio2 = (() => {
  const AC = (typeof window !== "undefined") && (window.AudioContext || window.webkitAudioContext);
  let ac = null, master = null, sfxGain = null, musGain = null;
  let engOsc = null, engGain = null, engFilter = null;
  let musicTimer = null, musicStep = 0, musicNext = 0;

  function ensure() {
    if (!AC || ac) return;
    try {
      ac = new AC();
      master = ac.createGain(); master.gain.value = 0.5; master.connect(ac.destination);
      sfxGain = ac.createGain(); sfxGain.connect(master);
      musGain = ac.createGain(); musGain.gain.value = 0.16; musGain.connect(master);
      sfxGain.gain.value = save.sound ? 1 : 0;
      /* engine */
      engOsc = ac.createOscillator(); engOsc.type = "sawtooth"; engOsc.frequency.value = 70;
      engFilter = ac.createBiquadFilter(); engFilter.type = "lowpass"; engFilter.frequency.value = 700;
      engGain = ac.createGain(); engGain.gain.value = 0;
      engOsc.connect(engFilter); engFilter.connect(engGain); engGain.connect(sfxGain);
      engOsc.start();
      if (save.music) startMusic();
    } catch (e) { ac = null; }
  }
  function unlock() { ensure(); if (ac && ac.state === "suspended") ac.resume(); }

  function engine(speed, throttle, on) {
    if (!ac) return;
    const f = on ? (62 + Math.min(Math.abs(speed), 1000) * 0.16 + (throttle ? 30 : 0)) : 60;
    const g = on ? (0.028 + (throttle ? 0.045 : 0) + Math.min(Math.abs(speed), 900) / 900 * 0.02) : 0;
    engOsc.frequency.setTargetAtTime(f, ac.currentTime, 0.06);
    engGain.gain.setTargetAtTime(g, ac.currentTime, 0.08);
  }

  function blip(freq, dur, type, vol, slide) {
    if (!ac || !save.sound) return;
    const t = ac.currentTime;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type || "square"; o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide, 30), t + dur);
    g.gain.setValueAtTime(vol || 0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t + dur + 0.02);
  }
  function noise(dur, vol, freq) {
    if (!ac || !save.sound) return;
    const t = ac.currentTime;
    const len = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const s = ac.createBufferSource(); s.buffer = buf;
    const f = ac.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = freq || 900;
    const g = ac.createGain(); g.gain.value = vol || 0.2;
    s.connect(f); f.connect(g); g.connect(sfxGain); s.start(t);
  }
  const fx = {
    coin: () => blip(1320, 0.09, "square", 0.10, 1900),
    gem: () => { blip(1568, 0.10, "square", 0.10); setTimeout(() => blip(2093, 0.14, "square", 0.10), 70); },
    fuel: () => { blip(290, 0.16, "triangle", 0.16, 130); setTimeout(() => blip(880, 0.08, "square", 0.08), 130); },
    chute: () => noise(0.45, 0.16, 1400),
    crash: () => { noise(0.5, 0.3, 600); blip(110, 0.4, "triangle", 0.25, 40); },
    flip: () => { blip(880, 0.07, "square", 0.1); setTimeout(() => blip(1175, 0.07, "square", 0.1), 60); setTimeout(() => blip(1568, 0.12, "square", 0.1), 120); },
    land: v => noise(0.12, clamp(v / 1600, 0.03, 0.22), 500),
    click: () => blip(640, 0.05, "square", 0.08),
    win: () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => blip(f, 0.16, "square", 0.11), i * 110)); },
    fail: () => { [392, 330, 262].forEach((f, i) => setTimeout(() => blip(f, 0.2, "triangle", 0.13), i * 140)); }
  };

  /* tiny chiptune loop */
  const MEL = [72,0,76,0,79,0,76,0, 72,0,76,0,79,76,72,0, 74,0,77,0,81,0,77,0, 79,77,76,74,72,0,67,0];
  const BASS = [48,55,53,57,50,53,48,43];
  const STEP = 0.165;
  const midi = m => 440 * Math.pow(2, (m - 69) / 12);
  function schedNote(freq, t, dur, type, vol) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(musGain); o.start(t); o.stop(t + dur + 0.02);
  }
  function startMusic() {
    if (!ac || musicTimer) return;
    musicNext = ac.currentTime + 0.1; musicStep = 0;
    musicTimer = setInterval(() => {
      if (!ac) return;
      while (musicNext < ac.currentTime + 0.35) {
        const s = musicStep % 32;
        const m = MEL[s];
        if (m) schedNote(midi(m), musicNext, 0.16, "square", 0.10);
        if (s % 4 === 0) schedNote(midi(BASS[(s / 4) % 8]), musicNext, 0.3, "triangle", 0.14);
        musicNext += STEP; musicStep++;
      }
    }, 120);
  }
  function stopMusic() { if (musicTimer) { clearInterval(musicTimer); musicTimer = null; } }
  function setMusic(on) { if (on) { ensure(); startMusic(); } else stopMusic(); }
  function setSound(on) { if (sfxGain) sfxGain.gain.value = on ? 1 : 0; }
  return { unlock, engine, fx, setMusic, setSound };
})();
function audioUnlock() { Audio2.unlock(); }

/* =====================================================================
   TERRAIN
   A heightfield (one sample every DX px) plus a list of bridges whose
   planks are individually collapsible. Surface flag 1 marks ice.
   ===================================================================== */
const DX = 10;
const SURF_ROAD = 0, SURF_ICE = 1, SURF_PIT = 2;
const MU_ROAD = 1.1, MU_ICE = 0.12;
const PLANK_W = 42;

class Terrain {
  constructor(startY) {
    this.h = [startY]; this.surf = [SURF_ROAD];
    this.y = startY;
    this.bridges = []; this.items = []; this.hints = []; this.decor = []; this.rocks = [];
  }
  get width() { return (this.h.length - 1) * DX; }
  curX() { return (this.h.length - 1) * DX; }

  emit(y, s) { this.h.push(y); this.surf.push(s || SURF_ROAD); }
  flat(len, s) { const n = Math.max(1, Math.round(len / DX)); for (let i = 0; i < n; i++) this.emit(this.y, s); }
  curveTo(len, dy, s) {
    const n = Math.max(1, Math.round(len / DX)); const y0 = this.y;
    for (let i = 1; i <= n; i++) { const t = i / n; this.emit(y0 + dy * (1 - Math.cos(Math.PI * t)) / 2, s); }
    this.y = y0 + dy;
  }
  hill(len, h, s) { this.curveTo(len / 2, -h, s); this.curveTo(len / 2, h, s); }
  valley(len, d, s) { this.curveTo(len / 2, d, s); this.curveTo(len / 2, -d, s); }
  bumps(len, h, n, s) {
    const seg = len / (n * 2);
    for (let i = 0; i < n; i++) { this.curveTo(seg, -h, s); this.curveTo(seg, h, s); }
  }
  drop(dy) { this.curveTo(92, dy); }           /* steep cliff downwards */
  rampUp(len, h, s) { this.curveTo(len, -h, s); }
  rampDown(len, h, s) { this.curveTo(len, h, s); }
  /* quarter-cosine rise that ENDS at max steepness: a launch kicker */
  kicker(len, h, s) {
    const n = Math.max(1, Math.round(len / DX)); const y0 = this.y;
    for (let i = 1; i <= n; i++) { const t = i / n; this.emit(y0 - h * (1 - Math.cos(Math.PI * t / 2)), s); }
    this.y = y0 - h;
  }
  /* a complete jump: kicker, gap with a LOWER far lip, cushioned landing.
     Coins (and optionally a gem) are laid along the flight arc. */
  jump(run, kick, gapW, land, opt) {
    opt = opt || {};
    this.kicker(run, kick, opt.surf);
    const lipX = this.curX(), lipY = this.y;
    const depth = 680, edge = 30;
    this.curveTo(edge, depth);
    this.flat(Math.max(20, gapW - edge * 2), SURF_PIT);
    this.curveTo(edge, -(depth - land));
    this.curveTo(200, 70);                      /* landing downslope */
    const nC = opt.coins === undefined ? 5 : opt.coins;
    for (let i = 0; i < nC; i++) {
      const t = (i + 1) / (nC + 1);
      this.items.push({ type: "coin", x: lipX + gapW * t,
        y: lipY + land * t * t - 34 * Math.sin(Math.PI * t), taken: false, ph: Math.random() * TAU });
    }
    if (opt.gem) this.items.push({ type: "gem", x: lipX + gapW * 0.5,
      y: lipY + land * 0.25 - 95, taken: false, ph: Math.random() * TAU });
    return this;
  }
  gap(width, depth) {
    depth = depth || 640; const edge = 34;
    this.curveTo(edge, depth);
    this.flat(Math.max(20, width - edge * 2), SURF_PIT);
    this.curveTo(edge, -depth);
  }
  bridge(width, type) {
    const bx = this.curX(), by = this.y;
    this.gap(width, 660);
    const n = Math.max(2, Math.round(width / PLANK_W));
    const planks = [];
    for (let i = 0; i < n; i++) planks.push({ state: 0, t: 0, fy: 0, fa: 0, va: 0, vy: 0 });
    this.bridges.push({ x0: bx, w: width, y: by - 3, type: type || "wood", planks, plankW: width / n });
    return this;
  }
  /* highest drivable surface at x, used for item placement */
  topAt(x) {
    let y = this.groundY(x);
    for (const b of this.bridges) if (x >= b.x0 && x <= b.x0 + b.w) y = Math.min(y, b.y);
    return y;
  }
  groundY(x) {
    const fi = clamp(x / DX, 0, this.h.length - 1.001);
    const i = Math.floor(fi), f = fi - i;
    return this.h[i] + (this.h[i + 1] - this.h[i]) * f;
  }
  slopeAt(x) {
    const i = clamp(Math.floor(x / DX), 0, this.h.length - 2);
    return (this.h[i + 1] - this.h[i]) / DX;
  }
  surfAt(x) {
    const i = clamp(Math.round(x / DX), 0, this.surf.length - 1);
    return this.surf[i];
  }
  /* --- item helpers (placed relative to the drivable surface) --- */
  coins(x, n, gapPx, hover) {
    gapPx = gapPx || 48; hover = hover === undefined ? 64 : hover;
    for (let i = 0; i < n; i++) this.items.push({ type: "coin", x: x + i * gapPx, y: this.topAt(x + i * gapPx) - hover, taken: false, ph: Math.random() * TAU });
  }
  coinArc(x, n, gapPx, base, peak) {
    gapPx = gapPx || 52; base = base || 70; peak = peak || 170;
    for (let i = 0; i < n; i++) {
      const t = n === 1 ? 0.5 : i / (n - 1);
      const hover = base + Math.sin(Math.PI * t) * peak;
      this.items.push({ type: "coin", x: x + i * gapPx, y: this.topAt(x + i * gapPx) - hover, taken: false, ph: Math.random() * TAU });
    }
  }
  gem(x, hover) { this.items.push({ type: "gem", x, y: this.topAt(x) - (hover === undefined ? 90 : hover), taken: false, ph: Math.random() * TAU }); }
  fuel(x, hover) { this.items.push({ type: "fuel", x, y: this.topAt(x) - (hover === undefined ? 46 : hover), taken: false, ph: Math.random() * TAU }); }
  hint(x, text) { this.hints.push({ x, text, shown: false }); }

  finalize(seed, snowy) {
    /* decorations: trees on sane slopes, rocks sprinkled in the dirt */
    const rnd = mulberry32(seed);
    let x = 260;
    while (x < this.width - 360) {
      const gy = this.groundY(x);
      const onBridge = this.bridges.some(b => x > b.x0 - 60 && x < b.x0 + b.w + 60);
      const slope = Math.abs(this.slopeAt(x));
      if (!onBridge && slope < 0.5 && gy < this.h[0] + 260 && rnd() < 0.6)
        this.decor.push({ x: x + rnd() * 80, y: this.groundY(x), s: 0.7 + rnd() * 0.8, snowy });
      x += 320 + rnd() * 300;
    }
    for (let rx = 0; rx < this.width; rx += 26 + rnd() * 40) {
      const gy = this.groundY(rx);
      this.rocks.push({ x: rx, y: gy + 26 + rnd() * 95, r: 2 + rnd() * 5, a: 0.12 + rnd() * 0.2 });
    }
  }
}

/* =====================================================================
   GAME STATE
   ===================================================================== */
let state = "menu";            // menu | levels | playing | paused | end
let levelIndex = 0;
let ter = null, level = null, finishX = 0, totalCoins = 0, totalGems = 0;
let particles = [], toasts = [];
let cam = { x: 0, y: 0, z: 1 }, shake = 0;
let runTime = 0, endReason = "";
let clouds = [];

const G = 1500;
const CAR = {
  wheelR: 20, ax: [-46, 48], ay: [18, 18],
  headX: 6, headY: -42, headR: 15,
  mass: 1, I: 5200,
  springK: 520, springD: 38,
  engine: 2050, vmax: 980, brake: 2900, rev: 950, revMax: 300,
  airTorque: 9.5
};
let car = null;

function makeCar(x, y, fuel) {
  return {
    x, y, a: 0, vx: 0, vy: 0, av: 0,
    fuel: fuel === undefined ? 100 : fuel,
    alive: true, finished: false,
    grounded: [false, false], airTime: 0, spin: 0, prevA: 0,
    chute: false, chuteT: 0, wheelSpin: 0,
    coins: 0, gems: 0, stuckT: 0, endT: 0, lastVy: 0
  };
}

function buildLevel(i) {
  const def = LEVELS[i];
  const t = new Terrain(560);
  def.make(t);
  t.flat(480);                                   /* run-out after the flag */
  t.finalize(def.seed, THEMES[def.theme].snow);
  ter = t;
  level = def;
  finishX = t.width - 560;
  totalCoins = t.items.filter(it => it.type === "coin").length;
  totalGems = t.items.filter(it => it.type === "gem").length;
}

function startLevel(i) {
  levelIndex = i;
  buildLevel(i);
  for (const it of ter.items) it.taken = false;
  for (const h of ter.hints) h.shown = false;
  car = makeCar(170, ter.topAt(170) - 70, LEVELS[i].startFuel);
  particles = []; toasts = []; runTime = 0; shake = 0; endReason = "";
  cam.x = car.x; cam.y = car.y; cam.z = 1;
  const rnd = mulberry32(i * 7 + 3);
  clouds = []; for (let c = 0; c < 7; c++) clouds.push({ x: rnd() * 2200, y: 60 + rnd() * 180, s: 0.7 + rnd() * 0.9 });
  setState("playing");
  Audio2.fx.click();
}
function restartLevel() { startLevel(levelIndex); }

function setState(s) {
  state = s;
  document.body.classList.toggle("ingame", s === "playing" || s === "paused" || s === "end");
  showOverlay(s === "menu" ? "ovMenu" : s === "levels" ? "ovLevels" : s === "paused" ? "ovPause" : s === "end" ? "ovEnd" : null);
}
function showOverlay(id) {
  for (const o of ["ovMenu", "ovLevels", "ovPause", "ovEnd"])
    document.getElementById(o).classList.toggle("show", o === id);
}
function pauseGame() { if (state !== "playing") return; setState("paused"); Audio2.engine(0, false, false); Audio2.fx.click(); }
function resumeGame() { setState("playing"); Audio2.fx.click(); }

function tryChute() {
  if (state !== "playing" || !car || !car.alive || car.finished) return;
  if (car.airTime > 0.12 && !car.chute) {
    car.chute = true; car.chuteT = 0;
    Audio2.fx.chute();
    toast(car.x, car.y - 90, "\uD83E\uDE82", "#fff", 30);
  }
}

/* =====================================================================
   PHYSICS
   ===================================================================== */
function surfaceAt(x, py, reach) {
  /* returns the topmost surface this point can rest on */
  let best = null;
  const gy = ter.groundY(x), m = ter.slopeAt(x);
  const gmu = ter.surfAt(x) === SURF_ICE ? MU_ICE : MU_ROAD;
  if (py <= gy + reach) best = { y: gy, m, mu: gmu, plank: null, ice: ter.surfAt(x) === SURF_ICE };
  for (const b of ter.bridges) {
    if (x >= b.x0 - 2 && x <= b.x0 + b.w + 2) {
      const pi = clamp(Math.floor((x - b.x0) / b.plankW), 0, b.planks.length - 1);
      const p = b.planks[pi];
      if (p.state < 2 && py <= b.y + reach) {
        if (!best || b.y < best.y) best = { y: b.y, m: 0, mu: b.type === "ice" ? MU_ICE : MU_ROAD, plank: p, bridge: b, ice: b.type === "ice" };
      }
    }
  }
  return best;
}

function physStep(dt) {
  const c = car;
  const gas = Input.gas && c.alive && !c.finished && c.fuel > 0;
  const brake = Input.brake && c.alive && !c.finished;

  let fx = 0, fy = G * CAR.mass, tq = 0;
  const cos = Math.cos(c.a), sin = Math.sin(c.a);
  let anyGround = false, groundVt = 0, onIce = false;
  c.touchPit = false;

  for (let w = 0; w < 2; w++) {
    const rx = CAR.ax[w] * cos - CAR.ay[w] * sin;
    const ry = CAR.ax[w] * sin + CAR.ay[w] * cos;
    const wx = c.x + rx, wy = c.y + ry;
    const s = surfaceAt(wx, wy, CAR.wheelR + 8);
    c.grounded[w] = false;
    if (!s) continue;
    const penV = wy + CAR.wheelR - s.y;
    if (penV <= 0) continue;

    const L = Math.sqrt(1 + s.m * s.m);
    const nx = s.m / L, ny = -1 / L;          /* surface normal, pointing up */
    const tx = 1 / L, ty = s.m / L;           /* tangent, pointing right     */
    const pen = penV / L;

    /* contact point velocity (includes rotation) */
    const vpx = c.vx + c.av * -ry;
    const vpy = c.vy + c.av * rx;
    const vn = vpx * nx + vpy * ny;
    const vt = vpx * tx + vpy * ty;

    let N = CAR.springK * pen + CAR.springD * Math.max(0, -vn);
    N = clamp(N, 0, 9500);
    if (N <= 0) continue;

    c.grounded[w] = true; anyGround = true; groundVt = vt; if (s.ice) onIce = true;
    if (!s.plank && ter.surfAt(wx) === SURF_PIT) c.touchPit = true;
    if (s.plank && s.plank.state === 0) { s.plank.state = 1; s.plank.t = 0; }

    let Fx = nx * N, Fy = ny * N;

    /* light rolling resistance; grip only limits drive and brake forces */
    let Ft = -vt * 0.4;

    /* drive and brake along the tangent, traction-limited */
    if (gas) {
      const drive = Math.min(CAR.engine * clamp(1 - vt / CAR.vmax, 0, 1), s.mu * N * 2.4);
      Ft += drive;
    }
    if (brake) {
      if (vt > 25) Ft -= Math.min(CAR.brake, s.mu * N * 3.2);
      else if (vt > -CAR.revMax) Ft -= Math.min(CAR.rev, s.mu * N * 2.4);
    }
    Fx += tx * Ft; Fy += ty * Ft;

    fx += Fx; fy += Fy;
    tq += rx * Fy - ry * Fx;
  }

  /* airborne control and parachute */
  if (!anyGround) {
    c.airTime += dt;
    if (c.alive && !c.finished) {
      if (gas) c.av -= CAR.airTorque * dt;
      if (brake) c.av += CAR.airTorque * dt;
    }
    /* short hops: drift the nose toward the flight direction for clean
       landings, unless the player is deliberately rotating */
    if (!gas && !brake && !c.chute && c.airTime < 0.8 && c.vx > 150) {
      let dv = Math.atan2(c.vy, c.vx) - c.a;
      dv = ((dv % TAU) + TAU) % TAU; if (dv > Math.PI) dv -= TAU;
      c.av += dv * 3.2 * dt;
    }
    if (c.chute) {
      c.chuteT += dt;
      const k = Math.min(c.chuteT * 6, 1);
      c.vx -= c.vx * 2.0 * k * dt;
      c.vy -= c.vy * 4.6 * k * dt;
      let da = -0.12 - c.a;
      da = ((da % TAU) + TAU) % TAU; if (da > Math.PI) da -= TAU;
      c.av += (da * 6 - c.av * 5) * dt;
    }
  } else {
    if (c.airTime > 0.25 && c.alive) onLanding();
    c.airTime = 0;
    if (c.chute) { c.chute = false; }
    /* keep the chassis tracking the ground angle */
    let dg = Math.atan(ter.slopeAt(c.x)) - c.a;
    dg = ((dg % TAU) + TAU) % TAU; if (dg > Math.PI) dg -= TAU;
    c.av += (dg * 11 - c.av * 2.2) * dt;
  }

  /* integrate */
  c.vx += (fx / CAR.mass) * dt;
  c.vy += (fy / CAR.mass) * dt;
  c.av += (tq / CAR.I) * dt;
  c.av = clamp(c.av, -8, 8);
  c.av *= (1 - (anyGround ? 3.0 : 0.3) * dt);
  c.vx *= (1 - 0.02 * dt); c.vy *= (1 - 0.02 * dt);
  c.x += c.vx * dt; c.y += c.vy * dt;
  const da = c.av * dt;
  c.a += da;
  if (c.airTime > 0) c.spin += da;
  c.lastVy = c.vy;

  c.wheelSpin += (anyGround ? groundVt : (gas ? 700 : c.vx)) / CAR.wheelR * dt;

  /* helmet vs terrain = crash, if it actually hits with force */
  if (c.alive && !c.finished) {
    const hx = c.x + CAR.headX * cos - CAR.headY * sin;
    const hy = c.y + CAR.headX * sin + CAR.headY * cos;
    const hs = surfaceAt(hx, hy, CAR.headR + 4);
    if (hs) {
      const pen = hy + CAR.headR - hs.y;
      const hvx = c.vx + c.av * -(CAR.headX * sin + CAR.headY * cos);
      const hvy = c.vy + c.av * (CAR.headX * cos - CAR.headY * sin);
      const L = Math.sqrt(1 + hs.m * hs.m);
      const vn = hvx * (hs.m / L) + hvy * (-1 / L);   /* + = away from ground */
      if (pen > 9 && vn < -240) crash();
      else if (pen > 26) crash();
    }
  }

  /* fuel */
  if (c.alive && !c.finished) {
    c.fuel -= (gas ? 2.3 : 0.22) * dt;
    c.fuel = Math.max(c.fuel, 0);
  }
}

function onLanding() {
  const c = car;
  const flips = Math.floor(Math.abs(c.spin) / (TAU * 0.86));
  if (flips > 0 && !c.finished) {
    const bonus = flips * 5;
    c.coins += bonus;
    toast(c.x, c.y - 110, (flips > 1 ? flips + "x FLIP! +" : "FLIP! +") + bonus, "#ffe24d", 30);
    Audio2.fx.flip();
  } else if (c.airTime > 1.3 && !c.finished) {
    c.coins += 3;
    toast(c.x, c.y - 110, "BIG AIR! +3", "#9be7ff", 26);
  }
  if (Math.abs(c.lastVy) > 350) {
    Audio2.fx.land(Math.abs(c.lastVy));
    dust(c.x, c.y + 30, Math.min(12, Math.abs(c.lastVy) / 90));
    shake = Math.min(10, Math.abs(c.lastVy) / 140);
  }
  c.spin = 0;
}

function crash() {
  const c = car;
  c.alive = false; c.chute = false;
  Audio2.fx.crash(); Audio2.fx.fail();
  shake = 14;
  for (let i = 0; i < 26; i++)
    particles.push({ x: c.x + (Math.random() - 0.5) * 60, y: c.y + (Math.random() - 0.5) * 40,
      vx: (Math.random() - 0.5) * 420, vy: -Math.random() * 420, life: 0.9 + Math.random() * 0.5,
      r: 3 + Math.random() * 5, col: Math.random() < 0.5 ? "#e02020" : "#444" });
  endReason = "crash";
}

/* =====================================================================
   PER-FRAME UPDATE
   ===================================================================== */
function update(dt) {
  runTime += dt;

  /* fixed-step physics */
  const STEP = 1 / 240;
  let acc = Math.min(dt, 0.05);
  while (acc > 0) { physStep(Math.min(STEP, acc)); acc -= STEP; }

  /* bridges */
  for (const b of ter.bridges) {
    const delay = b.type === "ice" ? 0.22 : 0.45;
    for (const p of b.planks) {
      if (p.state === 1) { p.t += dt; if (p.t > delay) { p.state = 2; p.va = (Math.random() - 0.5) * 6; p.vy = 60; } }
      else if (p.state === 2) { p.vy += G * 0.7 * dt; p.fy += p.vy * dt; p.fa += p.va * dt; if (p.fy > 1100) p.state = 3; }
    }
  }

  /* pickups */
  const c = car;
  if (c.alive && !c.finished) {
    const cos = Math.cos(c.a), sin = Math.sin(c.a);
    for (const it of ter.items) {
      if (it.taken || Math.abs(it.x - c.x) > 150) continue;
      let hit = (it.x - c.x) ** 2 + (it.y - c.y) ** 2 < 58 * 58;
      if (!hit) for (let w = 0; w < 2; w++) {
        const wx = c.x + CAR.ax[w] * cos - CAR.ay[w] * sin;
        const wy = c.y + CAR.ax[w] * sin + CAR.ay[w] * cos;
        if ((it.x - wx) ** 2 + (it.y - wy) ** 2 < 42 * 42) { hit = true; break; }
      }
      if (!hit) continue;
      it.taken = true;
      if (it.type === "coin") { c.coins++; Audio2.fx.coin(); sparkle(it.x, it.y, "#ffd700"); }
      else if (it.type === "gem") { c.gems++; Audio2.fx.gem(); sparkle(it.x, it.y, "#3fe07a"); toast(it.x, it.y - 40, "GEM!", "#3fe07a", 28); }
      else { c.fuel = 100; Audio2.fx.fuel(); sparkle(it.x, it.y, "#ff8c2e"); toast(it.x, it.y - 40, "FUEL!", "#ffb03a", 26); }
    }
    /* hints */
    for (const h of ter.hints) {
      if (!h.shown && c.x > h.x - 60) { h.shown = true; toast(c.x + 140, c.y - 170, h.text, "#ffffff", 26, 3.4); }
    }
  }

  /* dust while driving */
  if (c.alive && (c.grounded[0] || c.grounded[1]) && Input.gas && Math.random() < 0.5)
    dust(c.x - 56 * Math.cos(c.a), c.y + 26, 1);

  /* finish */
  if (c.alive && !c.finished && c.x >= finishX) {
    c.finished = true; c.endT = 0;
    Audio2.fx.win();
    for (let i = 0; i < 36; i++)
      particles.push({ x: finishX, y: ter.topAt(finishX) - 120, vx: (Math.random() - 0.5) * 600,
        vy: -200 - Math.random() * 500, life: 1 + Math.random(), r: 3 + Math.random() * 4,
        col: ["#ffd700", "#ff5252", "#3ee6c0", "#c873ff"][i % 4] });
  }
  if (c.finished) { c.endT += dt; if (c.endT > 1.1 && state === "playing") levelComplete(); }
  if (!c.alive) { c.endT += dt; if (c.endT > 1.2 && state === "playing") levelFailed(endReason); }

  /* out of fuel / stuck */
  if (c.alive && !c.finished) {
    const sp = Math.hypot(c.vx, c.vy);
    if (c.fuel <= 0 && sp < 12) { c.stuckT += dt; if (c.stuckT > 2.2) { endReason = "fuel"; c.alive = false; Audio2.fx.fail(); } }
    else if (sp < 6 && runTime > 4) { c.stuckT += dt; if (c.stuckT > 5) toast(c.x, c.y - 130, "Stuck? Press \u21BB / R", "#fff", 22, 1.6), c.stuckT = 2.5; }
    else c.stuckT = 0;
    if (c.y > ter.groundY(c.x) + 600) { endReason = "crash"; crash(); }
    if (c.touchPit) { endReason = "crash"; crash(); }
  }

  /* particles, toasts */
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 900 * dt; p.vx *= (1 - 1.4 * dt);
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = toasts.length - 1; i >= 0; i--) {
    const t = toasts[i]; t.t += dt; t.y -= 26 * dt;
    if (t.t > t.dur) toasts.splice(i, 1);
  }

  /* camera */
  const speed = Math.hypot(c.vx, c.vy);
  const look = clamp(c.vx * 0.38, -120, 300);
  const tz = clamp(1.06 - speed / 980 * 0.34 - (c.airTime > 0.4 ? 0.08 : 0), 0.68, 1.06);
  cam.z = lerp(cam.z, tz, 1 - Math.pow(0.04, dt));
  cam.x = lerp(cam.x, c.x + look, 1 - Math.pow(0.002, dt));
  cam.y = lerp(cam.y, c.y - 70, 1 - Math.pow(0.01, dt));
  shake = Math.max(0, shake - 28 * dt);

  /* HUD + audio */
  updateHUD();
  Audio2.engine(speed, Input.gas && c.fuel > 0, c.alive && !c.finished && state === "playing");

  document.getElementById("ctlChute").classList.toggle("ready", c.airTime > 0.12 && !c.chute && c.alive && !c.finished);
}

function dust(x, y, n) {
  for (let i = 0; i < n; i++)
    particles.push({ x: x + (Math.random() - 0.5) * 24, y, vx: (Math.random() - 0.5) * 90 - 40,
      vy: -30 - Math.random() * 70, life: 0.4 + Math.random() * 0.3, r: 3 + Math.random() * 4,
      col: THEMES[level.theme].snow ? "rgba(240,250,255,0.8)" : "rgba(150,115,80,0.7)" });
}
function sparkle(x, y, col) {
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * TAU, s = 120 + Math.random() * 180;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 80, life: 0.5 + Math.random() * 0.3, r: 2.5 + Math.random() * 2.5, col });
  }
}
function toast(x, y, text, col, size, dur) {
  toasts.push({ x, y, text, col: col || "#fff", size: size || 26, t: 0, dur: dur || 1.4 });
}

/* ----------------------------- HUD -------------------------------- */
const elGems = document.getElementById("hudGems");
const elCoins = document.getElementById("hudCoins");
const elFuelPct = document.getElementById("hudFuelPct");
const elFuelBar = document.getElementById("fuelBar");
let hudCache = { g: -1, c: -1, f: -1 };
function updateHUD() {
  if (!car) return;
  if (hudCache.g !== car.gems) { elGems.textContent = car.gems; hudCache.g = car.gems; }
  if (hudCache.c !== car.coins) { elCoins.textContent = car.coins; hudCache.c = car.coins; }
  const f = Math.round(car.fuel);
  if (hudCache.f !== f) { elFuelPct.textContent = f + "%"; elFuelBar.style.width = f + "%"; hudCache.f = f; }
}

/* =====================================================================
   LEVEL END
   ===================================================================== */
function starsForRun() {
  const cPct = totalCoins ? car.coins / totalCoins : 1;
  let s = 1;
  if (cPct >= 0.55) s = 2;
  if (cPct >= 0.8 && car.gems >= totalGems) s = 3;
  return s;
}
function levelComplete() {
  const stars = starsForRun();
  const prev = save.stars[levelIndex] || 0;
  save.stars[levelIndex] = Math.max(prev, stars);
  save.unlocked = Math.max(save.unlocked, Math.min(levelIndex + 2, LEVELS.length));
  Save.store(save);
  document.getElementById("endTitle").textContent = "Level Complete!";
  document.getElementById("endStars").textContent = "\u2605".repeat(stars) + "\u2606".repeat(3 - stars);
  document.getElementById("endStats").innerHTML =
    "\uD83E\uDE99 " + car.coins + " / " + totalCoins + " &nbsp; \uD83D\uDC8E " + car.gems + " / " + totalGems +
    "<br>Time " + runTime.toFixed(1) + "s";
  document.getElementById("btnNext").style.display = levelIndex + 1 < LEVELS.length ? "" : "none";
  setState("end");
}
function levelFailed(reason) {
  document.getElementById("endTitle").textContent = reason === "fuel" ? "Out of Fuel!" : "Crashed!";
  document.getElementById("endStars").textContent = "";
  document.getElementById("endStats").innerHTML =
    "\uD83E\uDE99 " + car.coins + " &nbsp; \uD83D\uDC8E " + car.gems + "<br>Try again, you've got this!";
  document.getElementById("btnNext").style.display = "none";
  setState("end");
}

/* =====================================================================
   RENDER
   ===================================================================== */
function render() {
  ctx.clearRect(0, 0, W, H);
  if (!ter) { renderSkyOnly(); return; }
  const th = THEMES[level.theme];

  /* sky */
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, th.skyTop); sky.addColorStop(1, th.skyBot);
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  /* sun */
  ctx.fillStyle = "rgba(255,240,160,0.9)";
  ctx.beginPath(); ctx.arc(W * 0.82, H * 0.16, 44, 0, TAU); ctx.fill();
  ctx.fillStyle = "rgba(255,240,160,0.25)";
  ctx.beginPath(); ctx.arc(W * 0.82, H * 0.16, 70, 0, TAU); ctx.fill();

  /* clouds (parallax) */
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  for (const cl of clouds) {
    const cx = ((cl.x - cam.x * 0.25) % (W + 600) + W + 600) % (W + 600) - 300;
    drawCloud(cx, cl.y, cl.s);
  }

  /* far hills */
  ctx.fillStyle = th.far;
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let sx = 0; sx <= W; sx += 24) {
    const wx2 = sx + cam.x * 0.35;
    ctx.lineTo(sx, H * 0.62 + Math.sin(wx2 * 0.0021) * 60 + Math.sin(wx2 * 0.0007) * 90);
  }
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();

  /* world transform */
  ctx.save();
  const shx = (Math.random() - 0.5) * shake, shy = (Math.random() - 0.5) * shake;
  ctx.translate(W / 2 + shx, H * 0.55 + shy);
  ctx.scale(cam.z, cam.z);
  ctx.translate(-cam.x, -cam.y);

  const viewL = cam.x - W / 2 / cam.z - 80, viewR = cam.x + W / 2 / cam.z + 80;
  const viewB = cam.y + H / cam.z;

  drawTerrain(th, viewL, viewR, viewB);
  drawBridges(viewL, viewR);
  drawDecor(viewL, viewR, th);
  drawFinish();
  drawItems(viewL, viewR);
  drawCar();
  drawParticles();
  drawToasts();

  ctx.restore();

  drawSpeedo();
}

function renderSkyOnly() {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, "#2e9be6"); sky.addColorStop(1, "#bfe9ff");
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
}

function drawCloud(x, y, s) {
  ctx.beginPath();
  ctx.ellipse(x, y, 56 * s, 26 * s, 0, 0, TAU);
  ctx.ellipse(x + 40 * s, y + 6 * s, 44 * s, 22 * s, 0, 0, TAU);
  ctx.ellipse(x - 42 * s, y + 8 * s, 40 * s, 20 * s, 0, 0, TAU);
  ctx.fill();
}

function drawTerrain(th, l, r, bottom) {
  const i0 = clamp(Math.floor(l / DX), 0, ter.h.length - 2);
  const i1 = clamp(Math.ceil(r / DX), 1, ter.h.length - 1);

  /* dirt body */
  ctx.beginPath();
  ctx.moveTo(i0 * DX, bottom + 400);
  for (let i = i0; i <= i1; i++) ctx.lineTo(i * DX, ter.h[i]);
  ctx.lineTo(i1 * DX, bottom + 400);
  ctx.closePath();
  const dg = ctx.createLinearGradient(0, cam.y - 200, 0, cam.y + 600);
  dg.addColorStop(0, th.dirt); dg.addColorStop(1, th.dirtDark);
  ctx.fillStyle = dg; ctx.fill();

  /* rocks */
  ctx.fillStyle = "rgba(0,0,0,1)";
  for (const rk of ter.rocks) {
    if (rk.x < l || rk.x > r) continue;
    ctx.globalAlpha = rk.a;
    ctx.beginPath(); ctx.arc(rk.x, rk.y, rk.r, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;

  /* grass / snow lip */
  ctx.lineWidth = 16; ctx.lineCap = "round"; ctx.lineJoin = "round";
  ctx.strokeStyle = th.grassDark;
  ctx.beginPath();
  for (let i = i0; i <= i1; i++) { const x = i * DX, y = ter.h[i] + 5; i === i0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }
  ctx.stroke();
  ctx.lineWidth = 11; ctx.strokeStyle = th.grass;
  ctx.beginPath();
  for (let i = i0; i <= i1; i++) { const x = i * DX, y = ter.h[i]; i === i0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }
  ctx.stroke();

  /* ice patches drawn over the lip */
  ctx.lineWidth = 12; ctx.strokeStyle = "rgba(185,235,255,0.95)";
  ctx.beginPath();
  let open = false;
  for (let i = i0; i <= i1; i++) {
    if (ter.surf[i] === SURF_ICE) {
      const x = i * DX, y = ter.h[i] - 1;
      if (!open) { ctx.moveTo(x, y); open = true; } else ctx.lineTo(x, y);
    } else if (open) { ctx.stroke(); ctx.beginPath(); open = false; }
  }
  if (open) ctx.stroke();
}

function drawBridges(l, r) {
  for (const b of ter.bridges) {
    if (b.x0 + b.w < l || b.x0 > r) continue;
    for (let i = 0; i < b.planks.length; i++) {
      const p = b.planks[i];
      if (p.state === 3) continue;
      const px = b.x0 + i * b.plankW + b.plankW / 2;
      let py = b.y, pa = 0;
      if (p.state === 1) { py += Math.sin(p.t * 60) * 2; }
      if (p.state === 2) { py += p.fy; pa = p.fa; }
      ctx.save();
      ctx.translate(px, py); ctx.rotate(pa);
      if (b.type === "ice") {
        ctx.fillStyle = "rgba(190,232,255,0.92)";
        ctx.strokeStyle = "rgba(120,180,220,0.9)";
      } else {
        ctx.fillStyle = "#b07b42";
        ctx.strokeStyle = "#7a5128";
      }
      ctx.lineWidth = 2.5;
      const w2 = b.plankW / 2 - 2;
      roundRect(-w2, -7, w2 * 2, 14, 4); ctx.fill(); ctx.stroke();
      ctx.restore();
    }
    /* rope line */
    ctx.strokeStyle = "rgba(90,60,30,0.55)"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(b.x0 - 6, b.y - 8); ctx.lineTo(b.x0 + b.w + 6, b.y - 8); ctx.stroke();
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawDecor(l, r, th) {
  for (const d of ter.decor) {
    if (d.x < l - 100 || d.x > r + 100) continue;
    const s = d.s;
    ctx.fillStyle = "#7a4a26";
    ctx.fillRect(d.x - 6 * s, d.y - 26 * s, 12 * s, 28 * s);
    const layers = [[64, 52], [50, 96], [38, 134]];
    for (let i = 0; i < 3; i++) {
      const [w2, hgt] = layers[i];
      ctx.fillStyle = i % 2 ? "#1c6e2e" : "#238a3a";
      ctx.beginPath();
      ctx.moveTo(d.x - w2 * s, d.y - (20 + i * 34) * s);
      ctx.lineTo(d.x + w2 * s, d.y - (20 + i * 34) * s);
      ctx.lineTo(d.x, d.y - hgt * s - 26 * s);
      ctx.closePath(); ctx.fill();
      if (th.snow) {
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.beginPath();
        ctx.moveTo(d.x - w2 * 0.5 * s, d.y - (20 + i * 34) * s - hgt * 0.28 * s);
        ctx.lineTo(d.x + w2 * 0.5 * s, d.y - (20 + i * 34) * s - hgt * 0.28 * s);
        ctx.lineTo(d.x, d.y - hgt * s - 26 * s);
        ctx.closePath(); ctx.fill();
      }
    }
  }
}

function drawFinish() {
  const fy = ter.topAt(finishX);
  ctx.strokeStyle = "#666"; ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(finishX, fy); ctx.lineTo(finishX, fy - 170); ctx.stroke();
  const fw = 86, fh = 56, cs = 14;
  for (let yy = 0; yy < 4; yy++) for (let xx = 0; xx < 6; xx++) {
    ctx.fillStyle = (xx + yy) % 2 ? "#111" : "#fff";
    ctx.fillRect(finishX + 4 + xx * cs, fy - 170 + yy * cs, cs, cs);
  }
  ctx.strokeStyle = "#111"; ctx.lineWidth = 2;
  ctx.strokeRect(finishX + 4, fy - 170, fw - 2, fh);
}

function drawItems(l, r) {
  const t = performance.now() / 1000;
  for (const it of ter.items) {
    if (it.taken || it.x < l - 60 || it.x > r + 60) continue;
    const bob = Math.sin(t * 2.4 + it.ph) * 5;
    const y = it.y + bob;
    if (it.type === "coin") {
      const sq = Math.abs(Math.sin(t * 3 + it.ph));
      ctx.fillStyle = "#d99000";
      ctx.beginPath(); ctx.ellipse(it.x, y, 16 * Math.max(sq, 0.25), 16, 0, 0, TAU); ctx.fill();
      ctx.fillStyle = "#ffd23e";
      ctx.beginPath(); ctx.ellipse(it.x, y, 13 * Math.max(sq, 0.25), 13, 0, 0, TAU); ctx.fill();
      ctx.fillStyle = "#d99000";
      ctx.beginPath(); ctx.ellipse(it.x, y, 7 * Math.max(sq, 0.25), 7, 0, 0, TAU); ctx.fill();
    } else if (it.type === "gem") {
      ctx.save(); ctx.translate(it.x, y);
      ctx.fillStyle = "#2ecf6e";
      ctx.beginPath();
      ctx.moveTo(0, -18); ctx.lineTo(15, -5); ctx.lineTo(0, 20); ctx.lineTo(-15, -5);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(15, -5); ctx.lineTo(0, -2); ctx.closePath(); ctx.fill();
      ctx.restore();
    } else {
      ctx.save(); ctx.translate(it.x, y);
      ctx.fillStyle = "#f25c1d";
      roundRect(-14, -18, 28, 36, 6); ctx.fill();
      ctx.fillStyle = "#fff"; roundRect(-9, -11, 18, 12, 3); ctx.fill();
      ctx.strokeStyle = "#f25c1d"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(14, -10); ctx.quadraticCurveTo(24, -10, 24, 2); ctx.stroke();
      ctx.restore();
    }
  }
}

function drawCar() {
  const c = car;
  ctx.save();
  ctx.translate(c.x, c.y);

  /* parachute (drawn unrotated so the canopy stays above) */
  if (c.chute) {
    const k = Math.min(c.chuteT * 5, 1);
    const cx0 = -50 * k - c.vx * 0.04, cy0 = -120 * k;
    const span = 78 * k;
    const cos = Math.cos(c.a), sin = Math.sin(c.a);
    const p1x = -40 * cos - (-8) * sin, p1y = -40 * sin + (-8) * cos;
    const p2x = 40 * cos - (-8) * sin, p2y = 40 * sin + (-8) * cos;
    ctx.strokeStyle = "#234"; ctx.lineWidth = 2;
    for (const [px, py] of [[p1x, p1y], [p2x, p2y]]) {
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(cx0 - span * 0.8, cy0 + 8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(cx0 + span * 0.8, cy0 + 8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(cx0, cy0 - 6); ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(cx0 - span, cy0 + 10);
    ctx.quadraticCurveTo(cx0, cy0 - 64 * k, cx0 + span, cy0 + 10);
    ctx.quadraticCurveTo(cx0, cy0 + 26, cx0 - span, cy0 + 10);
    ctx.closePath();
    ctx.fillStyle = "#e63030"; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx0 - span * 0.4, cy0 + 4);
    ctx.quadraticCurveTo(cx0, cy0 - 58 * k, cx0 + span * 0.4, cy0 + 4);
    ctx.quadraticCurveTo(cx0, cy0 + 18, cx0 - span * 0.4, cy0 + 4);
    ctx.fillStyle = "#fff"; ctx.fill();
  }

  ctx.rotate(c.a);

  /* antenna */
  ctx.strokeStyle = "#222"; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-50, -8); ctx.lineTo(-66, -42); ctx.stroke();

  /* driver */
  ctx.fillStyle = "#d42424";
  roundRect(-12, -34, 30, 30, 8); ctx.fill();                     /* torso */
  ctx.beginPath(); ctx.arc(CAR.headX, CAR.headY, CAR.headR, 0, TAU); /* helmet */
  ctx.fillStyle = "#f5f5f5"; ctx.fill();
  ctx.fillStyle = "#d42424";
  ctx.beginPath(); ctx.arc(CAR.headX, CAR.headY, CAR.headR, -2.6, -0.5); ctx.lineTo(CAR.headX, CAR.headY); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#3a76d6";
  ctx.beginPath(); ctx.ellipse(CAR.headX + 7, CAR.headY + 2, 7, 6, 0, 0, TAU); ctx.fill();

  /* body */
  ctx.fillStyle = "#e02020";
  ctx.beginPath();
  ctx.moveTo(-62, 10);
  ctx.quadraticCurveTo(-66, -10, -48, -14);
  ctx.lineTo(-18, -14);
  ctx.quadraticCurveTo(0, -16, 14, -10);
  ctx.lineTo(34, -10);
  ctx.quadraticCurveTo(64, -10, 68, 4);
  ctx.quadraticCurveTo(70, 16, 56, 18);
  ctx.lineTo(-50, 18);
  ctx.quadraticCurveTo(-64, 18, -62, 10);
  ctx.closePath(); ctx.fill();
  /* windshield */
  ctx.fillStyle = "#cfeaff";
  ctx.beginPath();
  ctx.moveTo(18, -10); ctx.lineTo(30, -26); ctx.lineTo(36, -10);
  ctx.closePath(); ctx.fill();
  /* bumpers */
  ctx.fillStyle = "#f8f8f8";
  roundRect(-66, 6, 12, 10, 4); ctx.fill();
  roundRect(56, 4, 14, 10, 4); ctx.fill();

  /* wheels */
  for (let w = 0; w < 2; w++) {
    ctx.save();
    ctx.translate(CAR.ax[w], CAR.ay[w]);
    ctx.rotate(c.wheelSpin);
    ctx.fillStyle = "#1c1c1c";
    ctx.beginPath(); ctx.arc(0, 0, CAR.wheelR, 0, TAU); ctx.fill();
    ctx.fillStyle = "#e8e8e8";
    ctx.beginPath(); ctx.arc(0, 0, CAR.wheelR - 6, 0, TAU); ctx.fill();
    ctx.strokeStyle = "#777"; ctx.lineWidth = 2;
    for (let sN = 0; sN < 6; sN++) {
      const a = sN / 6 * TAU;
      ctx.beginPath(); ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * (CAR.wheelR - 6), Math.sin(a) * (CAR.wheelR - 6)); ctx.stroke();
    }
    ctx.fillStyle = "#333";
    ctx.beginPath(); ctx.arc(0, 0, 4.5, 0, TAU); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = clamp(p.life * 1.6, 0, 1);
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawToasts() {
  ctx.textAlign = "center";
  for (const t of toasts) {
    const fade = clamp((t.dur - t.t) * 2.5, 0, 1);
    ctx.globalAlpha = fade;
    ctx.font = "900 " + t.size + "px ui-rounded, 'Trebuchet MS', sans-serif";
    ctx.lineWidth = 5; ctx.strokeStyle = "rgba(0,0,0,0.45)";
    ctx.strokeText(t.text, t.x, t.y);
    ctx.fillStyle = t.col;
    ctx.fillText(t.text, t.x, t.y);
  }
  ctx.globalAlpha = 1;
}

function drawSpeedo() {
  if (!car) return;
  const cx = W / 2, cy = H - 26, R = 52;
  const sp = Math.hypot(car.vx, car.vy);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R, Math.PI, 0); ctx.closePath();
  ctx.fillStyle = "rgba(40,44,50,0.92)"; ctx.fill();
  ctx.strokeStyle = "#888"; ctx.lineWidth = 4; ctx.stroke();
  /* colour arc */
  ctx.lineWidth = 7;
  ctx.strokeStyle = "#39c43e";
  ctx.beginPath(); ctx.arc(cx, cy, R - 8, Math.PI, Math.PI * 1.55); ctx.stroke();
  ctx.strokeStyle = "#ffc83a";
  ctx.beginPath(); ctx.arc(cx, cy, R - 8, Math.PI * 1.55, Math.PI * 1.8); ctx.stroke();
  ctx.strokeStyle = "#f04030";
  ctx.beginPath(); ctx.arc(cx, cy, R - 8, Math.PI * 1.8, TAU); ctx.stroke();
  /* needle */
  const frac = clamp(sp / 1000, 0, 1);
  const ang = Math.PI + frac * Math.PI;
  ctx.strokeStyle = "#ff7a30"; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(ang) * (R - 14), cy + Math.sin(ang) * (R - 14)); ctx.stroke();
  ctx.fillStyle = "#ddd";
  ctx.beginPath(); ctx.arc(cx, cy, 5, 0, TAU); ctx.fill();
  ctx.restore();
}

/* =====================================================================
   UI WIRING
   ===================================================================== */
function buildLevelGrid() {
  const grid = document.getElementById("levelGrid");
  grid.innerHTML = "";
  LEVELS.forEach((lv, i) => {
    const locked = i + 1 > save.unlocked;
    const btn = document.createElement("button");
    btn.className = "lvCard" + (locked ? " locked" : "");
    const stars = save.stars[i] || 0;
    btn.innerHTML =
      '<div class="lvNum">' + (locked ? "\uD83D\uDD12" : (i + 1)) + "</div>" +
      '<div class="lvName">' + lv.name + "</div>" +
      '<div class="lvStars">' + (locked ? "" : "\u2605".repeat(stars) + "\u2606".repeat(3 - stars)) + "</div>";
    if (!locked) btn.addEventListener("click", () => { audioUnlock(); startLevel(i); });
    grid.appendChild(btn);
  });
}

function refreshAudioButtons() {
  document.getElementById("btnMusic").classList.toggle("off", !save.music);
  document.getElementById("btnSound").classList.toggle("off", !save.sound);
}

function setupUI() {
  document.getElementById("btnPlay").addEventListener("click", () => { audioUnlock(); Audio2.fx.click(); buildLevelGrid(); setState("levels"); });
  document.getElementById("btnBackMenu").addEventListener("click", () => { Audio2.fx.click(); setState("menu"); });
  document.getElementById("btnPause").addEventListener("click", pauseGame);
  document.getElementById("btnRestart").addEventListener("click", () => { if (state === "playing") restartLevel(); });
  document.getElementById("btnContinue").addEventListener("click", resumeGame);
  document.getElementById("btnPauseRestart").addEventListener("click", () => { restartLevel(); });
  document.getElementById("btnPauseMenu").addEventListener("click", () => { Audio2.fx.click(); buildLevelGrid(); setState("levels"); Audio2.engine(0, false, false); });
  document.getElementById("btnNext").addEventListener("click", () => { startLevel(Math.min(levelIndex + 1, LEVELS.length - 1)); });
  document.getElementById("btnRetry").addEventListener("click", () => { restartLevel(); });
  document.getElementById("btnEndLevels").addEventListener("click", () => { Audio2.fx.click(); buildLevelGrid(); setState("levels"); });
  document.getElementById("btnMusic").addEventListener("click", () => {
    audioUnlock(); save.music = !save.music; Save.store(save); Audio2.setMusic(save.music); refreshAudioButtons();
  });
  document.getElementById("btnSound").addEventListener("click", () => {
    audioUnlock(); save.sound = !save.sound; Save.store(save); Audio2.setSound(save.sound); refreshAudioButtons(); Audio2.fx.click();
  });
  document.addEventListener("visibilitychange", () => { if (document.hidden && state === "playing") pauseGame(); });
}

/* ----------------------------- loop ------------------------------- */
let last = 0;
function frame(t) {
  const dt = Math.min((t - last) / 1000 || 0.016, 0.05);
  last = t;
  if (state === "playing") update(dt);
  render();
  requestAnimationFrame(frame);
}

function init() {
  resize();
  setupInputs();
  setupUI();
  refreshAudioButtons();
  setState("menu");
  requestAnimationFrame(frame);
}

/* test hooks for headless smoke testing */
if (typeof window !== "undefined") {
  window.__FR = { startLevel, update, physStep, buildLevel, LEVELS,
    get car() { return car; }, get ter() { return ter; }, get state() { return state; },
    setState, Input, tryChute };
}

init();
</script>
